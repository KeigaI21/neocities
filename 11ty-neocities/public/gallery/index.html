<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Keii Illustration - Gallery</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/navigation.css">
    

<link rel="stylesheet" href="/css/modal.css">

    
    <link rel="stylesheet" href="/css/gallery.css">
    

    <script src="/js/usersettings.js"></script>
    <script src="/js/lightdarkmodegeneral.js"></script>
    


    
    

<script src="/js/imagepopup.js" defer></script>

    
      <script src="/js/gallerycards.js" defer></script>
    
  </head>
  <body>
    <header class="nav"><script src="/js/showhidenav.js" defer></script>
<span class="link-buttons">
<a href="/">
    <span class="icon themed-image" style="mask-image: url(/images/homeicon.png);"></span>
    <span class="expanding-button"> HOME </span>
</a>
<a href="/gallery/">
    <span class="icon themed-image" style="mask-image: url(/images/galleryicon.png);"></span>
    <span class="expanding-button"> GALLERY
</a>
<a href="/contact/">
    <span class="icon themed-image" style="mask-image: url(/images/contacticon.png);"></span>
    <span class="expanding-button"> CONTACT
</a>
<a href="/aboutme/">
    <span class="icon themed-image" style="mask-image: url(/images/aboutmeicon.png);"></span>
    <span class="expanding-button"> ABOUT ME
</a>
</span>
<span class="show-hide-button" id="show-button">
    <span class="icon themed-image" style="mask-image: url(/images/showicon.png);" onclick="showNav()"></span>
</span>
<span class="show-hide-button" id="hide-button">
    <span class="icon themed-image" style="mask-image: url(/images/hideicon.png);" onclick="hideNav()"></span>
</span>
</header>
    
<!-- Pop up image box, see modal.css and imagepopup.js -->
<div id="my-modal" class="modal">
    <span class="close-button clickable" onclick="closePopUp()">X</span>
  <img id="my-modal-image" class="modal-image">
</div>

    <div class="center-box"">
    <h1>Art Gallery</h1>
    <hr>
    <br>
    <div class="image-card">
        <p><span style="font-size: 15px;">01 </span><span style="font-size: 11px;"">/</span> Syzygy</p>
        <img class="clickable" src="/images/syzygy.webp" alt="An artwork titled syzygy. It depicts a woman in a white dress who controls a silver substance to create weapons." onclick="popUp(this)">
    </div>
    <div class="image-card" style="display: none;">
        <p><span style="font-size: 15px;">02 </span><span style="font-size: 11px;"">/</span> Agent of Hermes</p>
        <img class="clickable" src="/images/hermes.webp" alt="An agent of Hermes on a mission in the underworld." onclick="popUp(this)">
    </div>
    <div class="image-card" style="display: none;">
        <p><span style="font-size: 15px;">03 </span><span style="font-size: 11px;"">/</span> Lightyears</p>
        <img class="clickable" src="/images/lightyears.webp" alt="An artwork titled lightyears. It depicts an giant stone eye with stars in its pupil. Underneath is a lonely lady with clouds, rockets, and a radar in the background." onclick="popUp(this)">
    </div>
    <!-- Image card navigation buttons -->
    <br>
    <div style="position: absolute; bottom: 30px"> <span onclick="previousImage()">&lt;</span> <span onclick="nextImage()">&gt;</span> </div>
</div>
  </body>
</html>
