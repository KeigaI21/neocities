<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Keii Illustration - Gallery</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/navigation.css">
    

<link rel="stylesheet" href="/css/modal.css">

    
    <link rel="stylesheet" href="/css/gallery.css">
    

    <script src="/js/usersettings.js"></script>
    <script src="/js/lightdarkmodegeneral.js"></script>
    


    
    

<script src="/js/imagepopup.js" defer></script>

    
      <script src="/js/gallerycards.js" defer></script>
    
  </head>
  <body>
    <svg width="0" height="0">
    <defs>
        <filter id="fill-secondary-color">
            <feFlood flood-color="var(--secondary-color)" result="flood"></feFlood>
            <feComposite in="flood", in2="SourceGraphic" operator="in"></feComposite>
        </filter>
        <filter id="fill-primary-color">
            <feFlood flood-color="var(--primary-color)" result="flood"></feFlood>
            <feComposite in="flood", in2="SourceGraphic" operator="in"></feComposite>
        </filter>
    </defs>
</svg>
    <header class="nav"><script src="/js/showhidenav.js" defer></script>
<span class="link-buttons">
<a href="/">
    <img src="/images/homeicon.png" class="icon">
    <span class="expanding-button"> HOME </span>
</a>
<a href="/gallery/">
    <img src="/images/galleryicon.png" class="icon">
    <span class="expanding-button"> GALLERY </span>
</a>
<a href="/contact/">
    <img src="/images/contacticon.png" class="icon">
    <span class="expanding-button"> CONTACT </span>
</a>
<a href="/aboutme/">
    <img src="/images/aboutmeicon.png" class="icon">
    <span class="expanding-button"> ABOUT ME </span>
</a>
</span>
<span class="show-hide-button" id="show-button">
    <img src="/images/showicon.png" class="icon" onclick="showNav()">
</span>
<span class="show-hide-button" id="hide-button">
    <img src="/images/hideicon.png" class="icon" onclick="hideNav()">
</span>
</header>
    
<!-- Pop up image box, see modal.css and imagepopup.js -->
<div id="my-modal" class="modal">
    <span class="close-button clickable" onclick="closePopUp()">X</span>
  <img id="my-modal-image" class="modal-image">
</div>

    <div class="center-box"">
    <h1>Art Gallery</h1>
    <hr>
    <br>
    <div class="image-card">
        <p><span style="font-size: 15px;">01 </span><span style="font-size: 11px;"">/</span> Syzygy</p>
        <img class="clickable" src="/images/syzygy.webp" alt="An artwork titled syzygy. It depicts a woman in a white dress who controls a silver substance to create weapons." onclick="popUp(this)">
        <p class = "caption">A soul in perfect syzygy. Her volition would move the cosmos.</p>
    </div>
    <div class="image-card" style="display: none;">
        <p><span style="font-size: 15px;">02 </span><span style="font-size: 11px;"">/</span> Agent of Hermes</p>
        <img class="vert-img clickable" src="/images/hermes.webp" alt="An agent of Hermes on a mission in the underworld." onclick="popUp(this)">
        <p class = "caption">Into the heart of darkness.</p>
    </div>
    <div class="image-card" style="display: none;">
        <p><span style="font-size: 15px;">03 </span><span style="font-size: 11px;"">/</span> Lightyears</p>
        <img class="clickable" src="/images/lightyears.webp" alt="An artwork titled lightyears. It depicts an giant stone eye with stars in its pupil. Underneath is a lonely lady with clouds, rockets, and a radar in the background." onclick="popUp(this)">
        <p class = "caption">Will we ever meet again?</p>
    </div>
    <!-- Image card navigation buttons. -->
    <br>
    <div style="position: absolute; bottom: 30px; display: flex; align-items: row;"">
        <img src="/images/hideicon.png" class="icon clickable" onclick="previousImage()">
        <img src="/images/showicon.png" class="icon clickable" onclick="nextImage()">
    </div>
</div>
  </body>
</html>
